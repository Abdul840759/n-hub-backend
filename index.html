<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Simple To-Do List</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f4f4f4;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .container {
      background-color: #fff;
      padding: 200px;
      border-radius: 5px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
    }
    h2 {
      margin-bottom: 20px;
    }
    input[type="text"] {
      width: 70%;
      padding: 10px;
      margin-right: 10px;
      border: 1px solid #ccc;
      border-radius: 3px;
    }
    button {
      padding: 10px 15px;
      margin-left: 40px;
      border: none;
      background-color: #161716;
      color: white;
      border-radius: 3px;
      cursor: pointer;
    }
    button:hover {
      background-color: #218838;
    }
    ul {
      list-style-type: none;
      padding-left: 0;
    }
    li {
      padding: 10px;
      background-color: #f9f9f9;
      border-bottom: 1px solid #ddd;
    }
  </style>
</head>
<body>
<div class="container">
  <h2>To-Do List</h2>
  <input type="text" id="taskInput" placeholder="Add a task">
  <button onclick="addTask()">Add</button>
  <ul id="taskList"></ul>
</div>

<script src="script.js"></script>
</body>
</html>
